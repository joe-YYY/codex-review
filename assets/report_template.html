<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}}</title>
<style>
:root{
  --bg:#f6f7f9;--card:#fff;--ink:#1d2129;--sub:#6b7280;--line:#e5e7eb;
  --blue:#165dff;--green:#00a862;--yellow:#f59e0b;--red:#ef4444;
  --green-bg:#e8fff3;--yellow-bg:#fff7e8;--red-bg:#fff0f0;--blue-bg:#eef4ff;
  --shadow:0 1px 3px rgba(0,0,0,.04),0 10px 28px rgba(0,0,0,.05);--radius:14px;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","SF Pro SC",system-ui,sans-serif;line-height:1.6;padding:28px 18px 72px}
.wrap{max-width:1120px;margin:0 auto}
header{margin-bottom:22px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
h1{font-size:28px;margin:0 0 6px}
h2{font-size:18px;margin:26px 0 12px}
.meta,.note{color:var(--sub);font-size:13px}
.legend-btn{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:7px 12px;font-size:13px;color:#374151;cursor:pointer;box-shadow:var(--shadow);white-space:nowrap}
.modal-mask{position:fixed;inset:0;background:rgba(17,24,39,.32);display:none;align-items:flex-start;justify-content:flex-end;padding:72px 28px;z-index:100}
.modal-mask.open{display:flex}
.legend-pop{width:min(360px,calc(100vw - 32px));background:var(--card);border-radius:14px;box-shadow:0 18px 48px rgba(0,0,0,.18);padding:18px}
.legend-pop h3{margin:0 0 10px;font-size:16px}
.legend-row{display:flex;gap:8px;align-items:flex-start;font-size:13px;margin:8px 0}
.legend-dot{width:9px;height:9px;border-radius:50%;margin-top:7px;flex:none}
.legend-dot.green{background:var(--green)}.legend-dot.yellow{background:var(--yellow)}.legend-dot.red{background:var(--red)}
.legend-close{border:0;background:#f3f4f6;border-radius:8px;padding:7px 10px;margin-top:8px;cursor:pointer}
.insight{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;margin:18px 0;border-left:4px solid var(--blue);font-size:15px}
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
.k{font-size:12px;color:var(--sub)}
.v{font-size:24px;font-weight:750;margin-top:4px}
.score{font-size:22px;font-weight:800}
.score.good{color:var(--green)}.score.warn{color:var(--yellow)}.score.bad{color:var(--red)}
.callout{border-radius:12px;padding:12px 14px;margin:10px 0;font-size:14px}
.callout.info{background:var(--blue-bg);border:1px solid #cfe0ff}
.callout.warn{background:var(--yellow-bg);border:1px solid #fed7aa}
.callout.action{background:var(--green-bg);border:1px solid #bbf7d0}
.callout.danger{background:var(--red-bg);border:1px solid #fecaca}
.label{font-size:12px;font-weight:800;color:#374151;margin-bottom:4px}
.stage{position:relative;padding:16px 44px 16px 16px;min-height:96px}
.stage:before{content:attr(data-step);position:absolute;right:14px;top:14px;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:12px;font-weight:800;background:var(--blue)}
.stage h3{padding-right:28px}
.stage:nth-child(2):before{background:var(--yellow)}.stage:nth-child(3):before{background:var(--green)}
table{width:100%;border-collapse:collapse;background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
th,td{padding:12px 14px;border-bottom:1px solid var(--line);font-size:13px;text-align:left;vertical-align:top}
th{background:#fafafa;color:var(--sub);font-weight:650}
.size{font-variant-numeric:tabular-nums;font-weight:700}
.bar{height:12px;background:#edf0f5;border-radius:8px;overflow:hidden;display:flex;margin-top:12px}
.bar i{display:block;height:100%;background:var(--blue)}
.tag{display:inline-flex;align-items:center;border-radius:999px;padding:2px 9px;font-size:12px;font-weight:650}
.tag.green{color:var(--green);background:var(--green-bg)}.tag.yellow{color:var(--yellow);background:var(--yellow-bg)}.tag.red{color:var(--red);background:var(--red-bg)}.tag.blue{color:var(--blue);background:var(--blue-bg)}
details{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin:12px 0;overflow:hidden;border-left:4px solid var(--line)}
details.green{border-left-color:var(--green)}details.yellow{border-left-color:var(--yellow)}details.red{border-left-color:var(--red)}
summary{cursor:pointer;padding:16px 18px;font-weight:720;display:flex;gap:12px;align-items:center}
.summary-name{flex:1}.summary-sub{font-weight:500;color:var(--sub);font-size:13px}
.body{padding:0 18px 18px}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.box{background:#fafafa;border:1px solid var(--line);border-radius:12px;padding:13px}
.box h3{font-size:13px;margin:0 0 6px;color:#374151}
.prompt{white-space:pre-wrap;background:#111827;color:#e5e7eb;border-radius:12px;padding:14px;font-family:"SF Mono",ui-monospace,monospace;font-size:12px;position:relative}
.copy{float:right;border:0;border-radius:7px;background:#374151;color:#fff;padding:4px 9px;cursor:pointer}
.profile-grid{display:grid;grid-template-columns:1.1fr 1.1fr 1.3fr;gap:14px}
.habit-list{display:grid;gap:10px;margin:0;padding:0;list-style:none}
.habit-list li{background:#fafafa;border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.small{font-size:13px;color:var(--sub)}
@media(max-width:820px){.grid,.grid3,.cols,.profile-grid{grid-template-columns:1fr}body{padding:18px 12px}header{align-items:flex-start}.v{font-size:21px}.modal-mask{padding:64px 16px;justify-content:center}.legend-btn{font-size:12px}}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div>
    <h1>{{title}}</h1>
    <div class="meta">{{date_range}} · {{generated_at}}</div>
  </div>
  <button class="legend-btn" id="legendBtn" type="button">颜色说明</button>
</header>

<div class="modal-mask" id="legendModal">
  <div class="legend-pop" role="dialog" aria-modal="true" aria-labelledby="legendTitle">
    <h3 id="legendTitle">颜色说明</h3>
    <div class="legend-row"><span class="legend-dot green"></span><span><strong>绿色</strong>：可以继续保持。</span></div>
    <div class="legend-row"><span class="legend-dot yellow"></span><span><strong>黄色</strong>：方向没问题，下次需要调整。</span></div>
    <div class="legend-row"><span class="legend-dot red"></span><span><strong>红色</strong>：容易造成返工，建议避免。</span></div>
    <button class="legend-close" id="legendClose" type="button">关闭</button>
  </div>
</div>

{{content}}
</div>
<script>
document.querySelectorAll('.copy').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const text = btn.parentElement.textContent.replace('复制','').trim();
    navigator.clipboard.writeText(text);
    btn.textContent='已复制';
    setTimeout(()=>btn.textContent='复制',1200);
  });
});
const legendBtn=document.getElementById('legendBtn');
const legendModal=document.getElementById('legendModal');
const legendClose=document.getElementById('legendClose');
function closeLegend(){legendModal.classList.remove('open')}
legendBtn.addEventListener('click',()=>legendModal.classList.add('open'));
legendClose.addEventListener('click',closeLegend);
legendModal.addEventListener('click',(event)=>{if(event.target===legendModal)closeLegend()});
document.addEventListener('keydown',(event)=>{if(event.key==='Escape')closeLegend()});
</script>
</body>
</html>
